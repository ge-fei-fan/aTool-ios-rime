<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>快速填充面板预览</title>
  <style>
    :root {
      color-scheme: light;
      --screen-bg: #f4f5f8;
      --keyboard-bg: #dfe0e4;
      --panel-bg: #dfe0e4;
      --key-bg: #ffffff;
      --special-key-bg: #abb2bd;
      --text: #111111;
      --secondary: #5a5a5f;
      --border: rgba(0, 0, 0, 0.06);
      --blue: #007aff;
      --shadow: rgba(0, 0, 0, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(0, 122, 255, 0.11), transparent 28rem),
        linear-gradient(180deg, #fbfbfd, var(--screen-bg));
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
    }

    .stage {
      width: min(430px, 100vw);
      padding: 18px;
    }

    .phone {
      width: 390px;
      max-width: 100%;
      margin: 0 auto;
      border-radius: 34px;
      padding: 14px;
      background: #111;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.26);
    }

    .screen {
      position: relative;
      height: 720px;
      overflow: hidden;
      border-radius: 24px;
      background: linear-gradient(180deg, #ffffff 0%, #f3f4f7 100%);
    }

    .app-content {
      height: 385px;
      padding: 28px 20px;
      color: #8d9098;
    }

    .input-card {
      margin-top: 64px;
      height: 46px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 15px;
    }

    .keyboard {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 335px;
      background: var(--keyboard-bg);
      padding: 6px 4px 8px;
    }

    .candidate-bar {
      height: 32px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 6px;
      color: var(--secondary);
    }

    .candidate-bar span {
      width: 28px;
      text-align: center;
      font-size: 20px;
    }

    .rows {
      display: grid;
      gap: 12px;
      margin-top: 7px;
    }

    .row {
      display: grid;
      gap: 6px;
      height: 42px;
    }

    .row.r1 { grid-template-columns: repeat(10, 1fr); }
    .row.r2 { grid-template-columns: 0.5fr repeat(9, 1fr) 0.5fr; }
    .row.r3 { grid-template-columns: 42px 0.5fr repeat(7, 1fr) 0.5fr 42px; }
    .row.r4 { grid-template-columns: 1.35fr 3.55fr 1fr 1.55fr; }

    .key {
      border-radius: 6px;
      background: var(--key-bg);
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 300;
      color: #111;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.45);
    }

    .key.special {
      background: var(--special-key-bg);
      font-size: 15px;
      font-weight: 400;
    }

    .spacer { background: transparent; }

    .quick-panel {
      position: absolute;
      inset: 0 0 0 0;
      background: var(--panel-bg);
      padding: 8px 6px 6px;
      z-index: 5;
      transition: filter 0.18s ease;
    }

    .quick-header {
      height: 36px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-button {
      position: absolute;
      top: 0;
      width: 36px;
      height: 36px;
      border: 0;
      padding: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      font-size: 25px;
      line-height: 36px;
      cursor: pointer;
    }

    .back { left: 2px; font-size: 28px; }
    .add { right: 4px; }

    .title-stack {
      display: grid;
      justify-items: center;
      gap: 4px;
      font-size: 17px;
      font-weight: 650;
    }

    .indicator {
      width: 20px;
      height: 3px;
      border-radius: 999px;
      background: var(--blue);
    }

    .quick-scroll {
      height: calc(100% - 44px);
      margin-top: 8px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state {
      width: 100%;
      height: 70%;
      min-height: 180px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 18px 16px;
    }

    .empty-state img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .empty-subtitle {
      font-size: 13px;
      color: var(--secondary);
    }

    .primary-button {
      height: 36px;
      padding: 0 18px;
      border: 0;
      border-radius: 18px;
      background: var(--blue);
      color: white;
      font-size: 15px;
      font-weight: 650;
      cursor: pointer;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: flex-end;
      padding: 0 16px 12px;
      background: rgba(0, 0, 0, 0.22);
    }

    .overlay.show { display: flex; }

    .add-card {
      width: 100%;
      border-radius: 18px;
      background: #fafafa;
      border: 1px solid var(--border);
      box-shadow: 0 8px 18px var(--shadow);
      padding: 14px 16px;
      transform: translateY(0);
    }

    .card-header {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 17px;
      font-weight: 650;
    }

    .close {
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      color: var(--secondary);
      font-size: 19px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 78px;
      margin-top: 12px;
      padding: 10px;
      resize: none;
      border-radius: 12px;
      border: 1px solid var(--border);
      outline: none;
      background: #f2f2f4;
      color: var(--text);
      font: 15px/1.35 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .action-button {
      height: 42px;
      border: 0;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 650;
      cursor: pointer;
    }

    .cancel { color: var(--secondary); background: #e9e9ec; }
    .save { color: white; background: var(--blue); }
    .save:disabled { opacity: 0.45; cursor: not-allowed; }

    .hint {
      margin: 14px auto 0;
      max-width: 390px;
      color: #666b76;
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="phone" aria-label="iPhone 快速填充面板预览">
      <div class="screen">
        <div class="app-content">
          <div>输入框获得焦点后显示键盘</div>
          <div class="input-card">点击文本工具打开快速填充面板</div>
        </div>

        <div class="keyboard">
          <div class="candidate-bar" aria-hidden="true">
            <span>👥</span><span>文</span><span>译</span><span>☺</span><span>☺</span><span>⌄</span>
          </div>
          <div class="rows" aria-hidden="true">
            <div class="row r1">q w e r t y u i o p</div>
            <div class="row r2"><i></i>a s d f g h j k l<i></i></div>
            <div class="row r3"><b>⇧</b><i></i>z x c v b n m<i></i><b>⌫</b></div>
            <div class="row r4"><b>123</b><b>空格</b><b>中/英</b><b>确认</b></div>
          </div>

          <section class="quick-panel" id="panel" aria-label="快速填充面板">
            <header class="quick-header">
              <button class="icon-button back" title="返回" aria-label="返回">‹</button>
              <div class="title-stack">
                <div>常用语</div>
                <div class="indicator"></div>
              </div>
              <button class="icon-button add" id="topAdd" title="添加常用语" aria-label="添加常用语">＋</button>
            </header>

            <div class="quick-scroll">
              <div class="empty-state">
                <img src="../../ios-icon/快速添加 .png" alt="快速添加" />
                <div class="empty-subtitle">添加后可在键盘中快速输入</div>
                <button class="primary-button" id="emptyAdd">添加常用语</button>
              </div>
            </div>
          </section>

          <div class="overlay" id="overlay" aria-label="添加常用语窗口">
            <form class="add-card" id="form">
              <div class="card-header">
                <span>添加常用语</span>
                <button class="close" type="button" id="close" aria-label="关闭">×</button>
              </div>
              <textarea id="phrase" placeholder="输入常用语内容"></textarea>
              <div class="actions">
                <button class="action-button cancel" type="button" id="cancel">取消</button>
                <button class="action-button save" id="save" type="submit" disabled>保存</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
    <p class="hint">点击右上角“＋”或“添加常用语”按钮，可预览键盘上方的添加窗口。</p>
  </main>

  <script>
    const overlay = document.querySelector('#overlay');
    const phrase = document.querySelector('#phrase');
    const save = document.querySelector('#save');
    const open = () => {
      overlay.classList.add('show');
      phrase.value = '';
      save.disabled = true;
      setTimeout(() => phrase.focus(), 50);
    };
    const close = () => overlay.classList.remove('show');

    document.querySelector('#topAdd').addEventListener('click', open);
    document.querySelector('#emptyAdd').addEventListener('click', open);
    document.querySelector('#close').addEventListener('click', close);
    document.querySelector('#cancel').addEventListener('click', close);
    overlay.addEventListener('click', (event) => {
      if (event.target === overlay) close();
    });
    phrase.addEventListener('input', () => {
      save.disabled = phrase.value.trim().length === 0;
    });
    document.querySelector('#form').addEventListener('submit', (event) => {
      event.preventDefault();
      close();
    });

    document.querySelectorAll('.row').forEach(row => {
      const tokens = row.childNodes.length === 1
        ? row.textContent.trim().split(/\s+/)
        : [];
      if (!tokens.length) return;
      row.textContent = '';
      tokens.forEach(token => {
        const key = document.createElement('div');
        key.className = 'key';
        key.textContent = token;
        row.appendChild(key);
      });
    });
    document.querySelectorAll('.row i').forEach(el => el.className = 'spacer');
    document.querySelectorAll('.row b').forEach(el => el.className = 'key special');
  </script>
</body>
</html>

name: Build TrollStore IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build unsigned app
        run: |
          set -euo pipefail
          mkdir -p build/logs
          if ! xcodebuild \
            -project Simpanin.xcodeproj \
            -scheme Simpanin \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            MARKETING_VERSION=1.0 \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build 2>&1 | tee build/logs/xcodebuild.log; then
            echo "::error title=xcodebuild failed::xcodebuild failed. Showing the last 200 log lines below."
            grep -E "error:|The following build commands failed|BUILD FAILED" build/logs/xcodebuild.log | tail -n 40 | while IFS= read -r line; do
              echo "::error title=xcodebuild detail::${line}"
            done
            tail -n 200 build/logs/xcodebuild.log
            exit 1
          fi

      - name: Inject entitlements
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/Simpanin.app"
          KEYBOARD_PATH="$APP_PATH/PlugIns/SimpaninKeyboard.appex"
          test -d "$APP_PATH"
          test -d "$KEYBOARD_PATH"

          /usr/bin/codesign \
            --force \
            --sign - \
            --timestamp=none \
            --generate-entitlement-der \
            --entitlements SimpaninKeyboard/SimpaninKeyboard.entitlements \
            "$KEYBOARD_PATH"

          /usr/bin/codesign \
            --force \
            --sign - \
            --timestamp=none \
            --generate-entitlement-der \
            --entitlements Simpanin/Simpanin.entitlements \
            "$APP_PATH"

          echo "App entitlements:"
          /usr/bin/codesign -d --entitlements :- "$APP_PATH"
          echo "Keyboard entitlements:"
          /usr/bin/codesign -d --entitlements :- "$KEYBOARD_PATH"

      - name: Verify extension package
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/Simpanin.app"
          KEYBOARD_PATH="$APP_PATH/PlugIns/SimpaninKeyboard.appex"
          test -d "$KEYBOARD_PATH"
          test -f "$KEYBOARD_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" "$KEYBOARD_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPrincipalClass" "$KEYBOARD_PATH/Info.plist"
          REQUESTS_OPEN_ACCESS=$(/usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionAttributes:RequestsOpenAccess" "$KEYBOARD_PATH/Info.plist")
          test "$REQUESTS_OPEN_ACCESS" = "true"

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/Simpanin.app"
          test -d "$APP_PATH"
          rm -rf Payload FITNEX-TrollStore.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry FITNEX-TrollStore.ipa Payload
          /usr/bin/unzip -l FITNEX-TrollStore.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FITNEX-TrollStore
          path: FITNEX-TrollStore.ipa
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: fitnex-${{ github.run_number }}.${{ github.run_attempt }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            FITNEX-TrollStore.ipa \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "FITNEX TrollStore IPA $RELEASE_TAG" \
            --notes "Unsigned TrollStore IPA built from $GITHUB_SHA." \
            --latest
